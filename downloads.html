<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --border-color: #30363d;
      --text-color: #c9d1d9;
      --text-muted: #8b949e;
      --accent-color: #58a6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 24px;
    }

    .title-group { display: flex; align-items: center; gap: 16px; }
    .title-icon { font-size: 32px; color: var(--accent-color); }
    .title { font-size: 28px; font-weight: 600; }

    .downloads-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .date-group {
      margin-top: 24px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .download-item {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: border-color 0.2s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .download-item:hover {
      border-color: var(--accent-color);
    }

    .file-icon {
      font-size: 32px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .file-info {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .file-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--accent-color);
    }

    .file-meta {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      background: #21262d;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .action-btn:hover { background: #30363d; }

    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title-group">
        <span class="material-icons title-icon">file_download</span>
        <h1 class="title">Downloads</h1>
      </div>
    </header>

    <div id="downloads-content">
      <!-- Download items will be injected here -->
    </div>
  </div>

  <script>
    const content = document.getElementById('downloads-content');

    async function loadDownloads() {
      const data = await window.electronAPI.getDownloads();
      renderDownloads(data);
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function renderDownloads(data) {
      if (!data || data.length === 0) {
        content.innerHTML = '<div class="empty-state">No downloads found.</div>';
        return;
      }

      content.innerHTML = '';
      let lastDate = '';

      data.forEach(item => {
        const dateObj = new Date(item.timestamp);
        const dateStr = dateObj.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        if (dateStr !== lastDate) {
          const group = document.createElement('div');
          group.className = 'date-group';
          group.textContent = dateStr === new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) ? 'Today' : dateStr;
          content.appendChild(group);
          lastDate = dateStr;
        }

        const div = document.createElement('div');
        div.className = 'download-item';

        const size = item.totalBytes ? formatBytes(item.totalBytes) : 'Unknown size';

        div.innerHTML = `
          <span class="material-icons file-icon">description</span>
          <div class="file-info">
            <span class="file-name">${item.fileName}</span>
            <span class="file-meta">${size} • ${item.url}</span>
          </div>
          <div class="actions">
            <button class="action-btn"><span class="material-icons" style="font-size: 16px">folder</span> Show in folder</button>
          </div>
        `;

        content.appendChild(div);
      });
    }

    loadDownloads();
  </script>
</body>
</html>
